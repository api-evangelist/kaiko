specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Kaiko
providerId: kaiko
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Crypto
  - Market Data
  - Institutional
  - Plans
description: >-
  Kaiko is sold via enterprise contracts only; there is no public self-serve tier or list price.
  Customers negotiate per-product modules (REST, Stream, Cloud Delivery, On-chain, Indices) and
  exchange / instrument coverage. Trial keys are available on request.
notes: Kaiko publishes no public pricing list; all plans are custom contracts.
sources:
  - https://www.kaiko.com/contact
  - https://docs.kaiko.com/
plans:
  - id: kaiko-trial
    name: Trial
    type: trial
    description: Time-limited evaluation key issued by Kaiko sales.
    entries:
      - label: Trial period
        name: trial_period
        type: flat
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Limited dataset
      - name: Limited rate
  - id: kaiko-enterprise
    name: Enterprise
    type: enterprise
    description: Custom contract; module and coverage based pricing.
    entries:
      - label: Custom pricing
        name: enterprise_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: REST, Stream, Cloud Delivery, On-chain, Indices modules
      - name: Redistribution rights negotiable
      - name: Dedicated SLA
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
