specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Kaiko
providerId: kaiko
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - Crypto
  - Market Data
  - Rate Limiting
description: >-
  Kaiko rate limits are negotiated per enterprise contract. Standard institutional contracts
  typically allow 10-100 requests per second on the REST API and a comparable stream connection
  count on Kaiko Stream. Throttled requests return HTTP 429.
notes: Limits are contract-specific; figures shown are typical institutional ranges.
sources:
  - https://docs.kaiko.com/
responseCodes:
  throttled: 429
limits:
  - name: REST API (typical)
    scope: api_key
    metric: requests_per_second
    limit: 100
    notes: Negotiated per contract.
  - name: Stream connections (typical)
    scope: api_key
    metric: concurrent_connections
    limit: 5
    notes: Negotiated per contract.
policies:
  - name: Backoff Strategy
    description: Honor 429 Retry-After and apply exponential backoff with jitter.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
